<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter Test</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh}
        .header{background:#16213e;padding:15px 20px;border-bottom:1px solid #0f3460;display:flex;align-items:center;gap:15px}
        .tabs{display:flex;gap:5px}
        .tab{padding:8px 16px;background:#0f3460;border:none;color:#888;cursor:pointer;border-radius:4px}
        .tab.active{background:#00d9ff;color:#1a1a2e}
        .toolbar{display:flex;align-items:center;gap:10px;padding:15px 20px;background:#16213e;border-bottom:1px solid #0f3460;flex-wrap:wrap}
        input,select{background:#1a1a2e;border:1px solid #0f3460;border-radius:4px;padding:8px 12px;color:#eee;font-size:13px}
        input:focus,select:focus{outline:none;border-color:#00d9ff}
        .btn{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:500}
        .btn-primary{background:#00d9ff;color:#1a1a2e}
        .btn-secondary{background:#0f3460;color:#eee}
        .btn-danger{background:#de350b;color:#fff}
        .btn:hover{opacity:0.9}
        .info-bar{padding:10px 20px;color:#888;font-size:13px;border-bottom:1px solid #0f3460}
        table{width:100%;border-collapse:collapse}
        th{text-align:left;padding:12px;color:#888;font-size:12px;border-bottom:1px solid #0f3460;text-transform:uppercase}
        td{padding:12px;border-bottom:1px solid #0f3460;font-size:14px}
        tr:hover{background:#16213e}
        .badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px}
        .badge-active{background:#00875a;color:#fff}
        .badge-inactive{background:#de350b;color:#fff}
        .badge-genre{background:#0f3460;color:#00d9ff}
        .pagination{display:flex;justify-content:center;gap:8px;padding:20px}
        .pagination button{background:#16213e;border:1px solid #0f3460;color:#eee;padding:6px 12px;border-radius:4px;cursor:pointer}
        .pagination button:disabled{opacity:0.4;cursor:not-allowed}
        .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;z-index:100}
        .modal{background:#16213e;border-radius:8px;padding:20px;width:600px;max-width:90%;max-height:80vh;overflow-y:auto}
        .modal h2{margin-bottom:15px;color:#00d9ff}
        .modal-close{float:right;background:none;border:none;color:#888;font-size:20px;cursor:pointer}
        .form-group{margin-bottom:15px}
        .form-group label{display:block;margin-bottom:5px;color:#888;font-size:13px}
        .form-group input,.form-group select{width:100%}
        .filter-row{display:flex;gap:10px;margin-bottom:10px;align-items:center}
        .filter-row input,.filter-row select{flex:1}
        .filter-list{margin:15px 0;padding:10px;background:#1a1a2e;border-radius:4px;max-height:200px;overflow-y:auto}
        .filter-item{display:flex;justify-content:space-between;align-items:center;padding:8px;background:#0f3460;border-radius:4px;margin-bottom:5px}
        .empty{text-align:center;padding:40px;color:#666}
        .url-display{background:#1a1a2e;padding:10px 20px;font-family:monospace;font-size:12px;color:#00ff00;border-bottom:1px solid #0f3460}
    </style>
</head>
<body>
    <div class="header">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('Book')">Books</button>
            <button class="tab" onclick="switchTab('Author')">Authors</button>
        </div>
        <div style="margin-left:auto">
            <button class="btn btn-primary" onclick="openFilterModal()">+ Create Filter</button>
        </div>
    </div>
    <div class="toolbar">
        <input type="text" id="search" placeholder="Search..." style="width:200px" onkeyup="debounceSearch()">
        <select id="saved-filter" onchange="applySavedFilter()">
            <option value="">-- Saved Filters --</option>
        </select>
        <select id="sort-by" onchange="fetchData()">
            <option value="id">ID</option>
            <option value="title">Title</option>
            <option value="name">Name</option>
            <option value="price">Price</option>
            <option value="rating">Rating</option>
            <option value="created_at">Created</option>
        </select>
        <select id="order" onchange="fetchData()">
            <option value="desc">DESC</option>
            <option value="asc">ASC</option>
        </select>
        <select id="page-size" onchange="currentPage=1;fetchData()">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="50">50</option>
        </select>
        <button class="btn btn-secondary" onclick="resetFilters()">Reset</button>
    </div>
    <div class="url-display" id="url-display">GET /api/books</div>
    <div class="info-bar" id="info-bar">Loading...</div>
    <div style="padding:0 20px 20px">
        <table><thead id="table-head"></thead><tbody id="table-body"></tbody></table>
    </div>
    <div class="pagination" id="pagination"></div>

    <!-- Create Filter Modal -->
    <div class="modal-overlay" id="filter-modal">
        <div class="modal">
            <button class="modal-close" onclick="closeFilterModal()">&times;</button>
            <h2>Create Saved Filter</h2>
            <div class="form-group">
                <label>Filter Name</label>
                <input type="text" id="filter-name" placeholder="My Custom Filter">
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="filter-desc" placeholder="Optional description">
            </div>
            <h3 style="margin:15px 0 10px;font-size:14px;color:#888">Filter Rules</h3>
            <div class="filter-row">
                <input type="text" id="new-field" placeholder="Field (e.g. price, author.country)">
                <select id="new-op">
                    <option value="eq">equals (eq)</option>
                    <option value="ne">not equals (ne)</option>
                    <option value="gt">greater than (gt)</option>
                    <option value="gte">greater or equal (gte)</option>
                    <option value="lt">less than (lt)</option>
                    <option value="lte">less or equal (lte)</option>
                    <option value="ilike">contains (ilike)</option>
                    <option value="in">in list (in)</option>
                    <option value="is_null">is null</option>
                </select>
                <input type="text" id="new-value" placeholder="Value">
                <button class="btn btn-secondary" onclick="addFilterRule()">Add</button>
            </div>
            <div class="filter-list" id="filter-rules"></div>
            <div class="form-group">
                <label>Sort By</label>
                <select id="modal-sort">
                    <option value="">None</option>
                    <option value="id">ID</option>
                    <option value="title">Title</option>
                    <option value="name">Name</option>
                    <option value="price">Price</option>
                    <option value="rating">Rating</option>
                    <option value="created_at">Created</option>
                </select>
            </div>
            <div class="form-group">
                <label>Sort Order</label>
                <select id="modal-order">
                    <option value="desc">Descending</option>
                    <option value="asc">Ascending</option>
                </select>
            </div>
            <div style="display:flex;gap:10px;margin-top:20px">
                <button class="btn btn-primary" onclick="saveFilter()">Save Filter</button>
                <button class="btn btn-secondary" onclick="closeFilterModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let currentTab='Book',currentPage=1,searchTimeout=null,filterRules=[],savedFilters=[],activeFilterId=null;

        function switchTab(tab){
            currentTab=tab;currentPage=1;activeFilterId=null;
            document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('search').value='';
            document.getElementById('saved-filter').value='';
            loadSavedFilters();
            fetchData();
        }

        function debounceSearch(){clearTimeout(searchTimeout);searchTimeout=setTimeout(()=>{currentPage=1;fetchData()},300)}

        async function loadSavedFilters(){
            try{
                const r=await fetch('/api/saved-filters?model_name='+currentTab);
                savedFilters=await r.json();
                const sel=document.getElementById('saved-filter');
                sel.innerHTML='<option value="">-- Saved Filters --</option>'+savedFilters.map(f=>'<option value="'+f.id+'">'+f.name+'</option>').join('');
            }catch(e){console.error(e)}
        }

        async function applySavedFilter(){
            const id=document.getElementById('saved-filter').value;
            if(!id){activeFilterId=null;fetchData();return}
            activeFilterId=id;
            currentPage=1;
            fetchDataWithFilter(id);
        }

        async function fetchDataWithFilter(filterId){
            const url='/api/saved-filters/'+filterId+'/apply?page='+currentPage;
            document.getElementById('url-display').textContent='GET '+url;
            document.getElementById('table-body').innerHTML='<tr><td colspan="10" class="empty">Loading...</td></tr>';
            try{
                const r=await fetch(url);
                const d=await r.json();
                if(!r.ok)throw new Error(d.detail);
                renderData(d);
            }catch(e){
                document.getElementById('table-body').innerHTML='<tr><td colspan="10" class="empty">Error: '+e.message+'</td></tr>';
            }
        }

        function buildUrl(){
            const p=new URLSearchParams();
            p.append('page',currentPage);
            p.append('size',document.getElementById('page-size').value);
            p.append('sort_by',document.getElementById('sort-by').value);
            p.append('order',document.getElementById('order').value);
            const s=document.getElementById('search').value;
            if(s)p.append('search',s);
            const endpoint=currentTab==='Book'?'/api/books':'/api/authors';
            return endpoint+'?'+p.toString();
        }

        async function fetchData(){
            if(activeFilterId){fetchDataWithFilter(activeFilterId);return}
            const url=buildUrl();
            document.getElementById('url-display').textContent='GET '+url;
            document.getElementById('table-body').innerHTML='<tr><td colspan="10" class="empty">Loading...</td></tr>';
            try{
                const r=await fetch(url);
                const d=await r.json();
                if(!r.ok)throw new Error(d.detail);
                renderData(d);
            }catch(e){
                document.getElementById('table-body').innerHTML='<tr><td colspan="10" class="empty">Error: '+e.message+'</td></tr>';
            }
        }

        function renderData(d){
            const m=d.meta;
            document.getElementById('info-bar').textContent=m.total_items+' items | Page '+m.page+' of '+m.total_pages;
            if(!d.data.length){document.getElementById('table-body').innerHTML='<tr><td colspan="10" class="empty">No data found</td></tr>';document.getElementById('pagination').innerHTML='';return}
            currentTab==='Book'?renderBooks(d.data):renderAuthors(d.data);
            renderPagination(m);
        }

        function renderBooks(books){
            document.getElementById('table-head').innerHTML='<tr><th>Title</th><th>Author</th><th>Genre</th><th>Price</th><th>Rating</th><th>Status</th></tr>';
            document.getElementById('table-body').innerHTML=books.map(b=>'<tr><td><strong>'+b.title+'</strong><br><small style="color:#666">ID: '+b.id+'</small></td><td>'+(b.author?b.author.name:'N/A')+'</td><td>'+(b.genre?'<span class="badge badge-genre">'+b.genre+'</span>':'-')+'</td><td>$'+b.price.toFixed(2)+'</td><td>'+(b.rating?b.rating.toFixed(1)+' ':'-')+'</td><td>'+(b.is_available?'<span class="badge badge-active">Active</span>':'<span class="badge badge-inactive">Inactive</span>')+'</td></tr>').join('');
        }

        function renderAuthors(authors){
            document.getElementById('table-head').innerHTML='<tr><th>Name</th><th>Email</th><th>Country</th><th>Birth Year</th><th>Status</th></tr>';
            document.getElementById('table-body').innerHTML=authors.map(a=>'<tr><td><strong>'+a.name+'</strong><br><small style="color:#666">ID: '+a.id+'</small></td><td>'+a.email+'</td><td>'+(a.country||'-')+'</td><td>'+(a.birth_year||'-')+'</td><td>'+(a.is_active?'<span class="badge badge-active">Active</span>':'<span class="badge badge-inactive">Inactive</span>')+'</td></tr>').join('');
        }

        function renderPagination(m){
            document.getElementById('pagination').innerHTML='<button onclick="goToPage(1)" '+(m.page<=1?'disabled':'')+'>First</button><button onclick="goToPage('+(m.page-1)+')" '+(m.page<=1?'disabled':'')+'>Prev</button><span style="color:#888">'+m.page+'/'+m.total_pages+'</span><button onclick="goToPage('+(m.page+1)+')" '+(!m.has_next?'disabled':'')+'>Next</button><button onclick="goToPage('+m.total_pages+')" '+(!m.has_next?'disabled':'')+'>Last</button>';
        }

        function goToPage(p){currentPage=p;fetchData()}

        function resetFilters(){
            document.getElementById('search').value='';
            document.getElementById('saved-filter').value='';
            document.getElementById('sort-by').value='id';
            document.getElementById('order').value='desc';
            activeFilterId=null;
            currentPage=1;
            fetchData();
        }

        function openFilterModal(){
            filterRules=[];
            document.getElementById('filter-name').value='';
            document.getElementById('filter-desc').value='';
            document.getElementById('new-field').value='';
            document.getElementById('new-value').value='';
            renderFilterRules();
            document.getElementById('filter-modal').style.display='flex';
        }

        function closeFilterModal(){document.getElementById('filter-modal').style.display='none'}

        function addFilterRule(){
            const field=document.getElementById('new-field').value.trim();
            const op=document.getElementById('new-op').value;
            let value=document.getElementById('new-value').value.trim();
            if(!field){alert('Please enter a field name');return}
            if(op==='in')value=value.split(',').map(v=>v.trim());
            else if(value==='true')value=true;
            else if(value==='false')value=false;
            else if(!isNaN(value)&&value!=='')value=Number(value);
            filterRules.push({field,operation:op,value});
            document.getElementById('new-field').value='';
            document.getElementById('new-value').value='';
            renderFilterRules();
        }

        function removeFilterRule(i){filterRules.splice(i,1);renderFilterRules()}

        function renderFilterRules(){
            const el=document.getElementById('filter-rules');
            if(!filterRules.length){el.innerHTML='<div style="color:#666;text-align:center;padding:10px">No filter rules added</div>';return}
            el.innerHTML=filterRules.map((r,i)=>'<div class="filter-item"><span>'+r.field+' <strong>'+r.operation+'</strong> '+JSON.stringify(r.value)+'</span><button class="btn btn-danger" onclick="removeFilterRule('+i+')"></button></div>').join('');
        }

        async function saveFilter(){
            const name=document.getElementById('filter-name').value.trim();
            if(!name){alert('Please enter a filter name');return}
            const data={
                name:name,
                description:document.getElementById('filter-desc').value.trim()||null,
                model_name:currentTab,
                filters:filterRules,
                sort_by:document.getElementById('modal-sort').value||null,
                sort_order:document.getElementById('modal-order').value,
                page_size:parseInt(document.getElementById('page-size').value)
            };
            try{
                const r=await fetch('/api/saved-filters',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
                if(!r.ok){const e=await r.json();throw new Error(e.detail)}
                closeFilterModal();
                loadSavedFilters();
                alert('Filter saved successfully!');
            }catch(e){alert('Error: '+e.message)}
        }

        loadSavedFilters();
        fetchData();
    </script>
</body>
</html>
