<div
  class="pagination-container"
  *ngIf="meta && meta.total_items > 0"
  aria-label="Pagination controls"
  data-testid="pagination-container"
>
  <div class="pagination-info" *ngIf="showItemsInfo">
    <span class="info-main">{{ itemsInfo }}</span>
    <span class="info-sep">•</span>
    <span class="info-total">{{ meta.total_pages }} pages</span>
  </div>

  <div class="pagination-nav">
    <button
      type="button"
      class="pagination-btn"
      [disabled]="isFirstPage"
      (click)="goToFirstPage()"
      title="First page"
      aria-label="Go to first page"
    >
      <span class="pagination-icon">&laquo;</span>
    </button>

    <button
      type="button"
      class="pagination-btn"
      [disabled]="isFirstPage"
      (click)="goToPreviousPage()"
      title="Previous page"
      aria-label="Go to previous page"
    >
      <span class="pagination-icon">&lsaquo;</span>
    </button>

    <span class="pagination-ellipsis" *ngIf="showEllipsisBefore">...</span>

    <button
      *ngFor="let page of pageNumbers"
      type="button"
      class="pagination-btn pagination-page"
      [class.active]="page === meta.page"
      (click)="goToPage(page)"
      [attr.aria-current]="page === meta.page ? 'page' : null"
    >
      {{ page }}
    </button>

    <span class="pagination-ellipsis" *ngIf="showEllipsisAfter">...</span>

    <button
      type="button"
      class="pagination-btn"
      data-testid="pagination-next"
      [disabled]="isLastPage"
      (click)="goToNextPage()"
      title="Next page"
      aria-label="Go to next page"
    >
      <span class="pagination-icon">&rsaquo;</span>
    </button>

    <button
      type="button"
      class="pagination-btn"
      [disabled]="isLastPage"
      (click)="goToLastPage()"
      title="Last page"
      aria-label="Go to last page"
    >
      <span class="pagination-icon">&raquo;</span>
    </button>
  </div>

  <div class="pagination-jump" *ngIf="meta.total_pages > 6">
    <label for="jumpPage" class="jump-label">Go to page</label>
    <input
      id="jumpPage"
      type="number"
      class="jump-input"
      [min]="1"
      [max]="meta.total_pages"
      [(ngModel)]="jumpPage"
      (keydown.enter)="onJumpSubmit()"
    />
    <button type="button" class="jump-btn" (click)="onJumpSubmit()">Go</button>
  </div>

  <div class="pagination-size" *ngIf="showPageSizeSelector">
    <label for="pageSize" class="pagination-size-label">Items per page:</label>
    <select
      id="pageSize"
      class="pagination-size-select"
      data-testid="pagination-size-select"
      [(ngModel)]="currentPageSize"
      (change)="onPageSizeChanged()"
    >
      <option *ngFor="let size of pageSizeOptions" [value]="size">
        {{ size }}
      </option>
    </select>
  </div>
</div>

<div class="pagination-empty" *ngIf="!meta || meta.total_items === 0">
  <span>No items to display</span>
</div>
